name: OCI ARM Instance Retry

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Install dependencies
        run: composer install --no-progress

      - name: Run OCI script
        env:
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_PRIVATE_KEY: ${{ secrets.OCI_PRIVATE_KEY }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SHAPE: "VM.Standard.A1.Flex"
          OCI_OCPUS: "4"
          OCI_MEMORY_IN_GBS: "24"
          OCI_OPERATING_SYSTEM: "Canonical Ubuntu"
          OCI_OPERATING_SYSTEM_VERSION: "22.04"
          OCI_DISPLAY_NAME: "IOX-NEXUS"
          OCI_BOOT_VOLUME_SIZE_IN_GBS: "200"
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
        run: php index.php
